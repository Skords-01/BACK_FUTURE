name: Link check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * 1"

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Dump fact source URLs
        run: npm run dump:source-urls

      - name: Check Markdown and built HTML links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --root-dir "$GITHUB_WORKSPACE/dist"
            --exclude "https://back-future.example.com/.*"
            --exclude-path './dist/.*\.html'
            --exclude-path './content/.*'
            './README.md'
            './docs/**/*.md'

      - name: Check fact source URLs
        uses: lycheeverse/lychee-action@v2
        continue-on-error: true
        with:
          args: >-
            --verbose
            --no-progress
            './dist/.fact-source-urls.md'
