name: Помилка або неточність
description: Повідомити про проблему в контенті або джерелі
title: "Неточність: "
labels: ["content", "bug"]
body:
  - type: input
    id: page
    attributes:
      label: Сторінка або факт
      placeholder: "https://..."
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Що не так
      description: Опиши фактичну помилку, некоректне формулювання або зламане джерело.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Підтвердження
      description: Додай джерела або пояснення, якщо маєш.
