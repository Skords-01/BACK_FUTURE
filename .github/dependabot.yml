version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Kyiv
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
        update-types:
          - "minor"
          - "patch"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "prettier-plugin-tailwindcss"
        update-types:
          - "minor"
          - "patch"
      linting:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "prettier"
          - "prettier-*"
          - "markdownlint-*"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "@playwright/*"
          - "vitest"
          - "@vitest/*"
        update-types:
          - "minor"
          - "patch"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "astro"
          - "@astrojs/*"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "prettier-plugin-tailwindcss"
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "prettier"
          - "prettier-*"
          - "markdownlint-*"
          - "@playwright/*"
          - "vitest"
          - "@vitest/*"
      prod-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "astro"
          - "@astrojs/*"
          - "tailwindcss"
          - "@tailwindcss/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:15"
      timezone: Europe/Kyiv
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(ci)
      include: scope
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
